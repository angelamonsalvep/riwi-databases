name: entrenamiento-hamilton-m4

services:
  db:
    image: postgres:latest
    container_name: instance_postgres_hamilton
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=modulo4_db
    ports:
      - "5432:5432"
    volumes:
      # Cambiamos la ruta interna para cumplir con el estándar de Postgres 18+
      - postgres_data:/var/lib/postgresql 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: